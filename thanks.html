<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesan Terkirim - Yonatan Chandra</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Poppins", "sans-serif"],
            },
            colors: {
              primary: "#FD6F00",
              neutralBlack: "#1E1E1E",
              textGray: "#797979",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
      @keyframes float {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }
    </style>
    <script>
      // Auto-detect and apply dark mode immediately before body rendering
      if (
        localStorage.getItem("color-theme") === "dark" ||
        (!("color-theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>
  <body
    class="bg-white dark:bg-neutralBlack text-neutralBlack dark:text-white transition-colors duration-300 antialiased min-h-screen flex items-center justify-center p-6 relative overflow-hidden"
  >
    <!-- Background subtle gradient decors -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>

    <div class="relative z-10 w-full max-w-lg bg-gray-50 dark:bg-[#242424] border border-gray-200 dark:border-gray-800 rounded-2xl p-8 md:p-12 text-center shadow-xl">
      <!-- Icon Container -->
      <div class="mb-8 flex justify-center">
        <div class="w-24 h-24 bg-primary/10 dark:bg-primary/20 rounded-full flex items-center justify-center text-primary animate-float shadow-inner">
          <!-- Paper Airplane SVG Icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-10 w-10 rotate-12"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
            />
          </svg>
        </div>
      </div>

      <!-- Heading -->
      <h1 class="text-3xl font-bold mb-4 tracking-tight leading-tight">
        Thank You!
      </h1>
      <h2 class="text-lg font-semibold text-primary mb-6">
        Pesan Berhasil Terkirim
      </h2>

      <!-- Description -->
      <p class="text-textGray dark:text-gray-400 mb-10 leading-relaxed text-sm md:text-base">
        Terima kasih telah menghubungi saya. Pesan Anda telah diterima oleh sistem FormSubmit dan akan segera saya baca. Saya akan membalasnya secepat mungkin melalui email yang Anda cantumkan.
      </p>

      <!-- CTA Button -->
      <div>
        <a
          href="index.html"
          class="inline-flex items-center justify-center bg-primary hover:bg-orange-600 text-white font-medium px-8 py-3.5 rounded-lg transition-all duration-300 hover:scale-[1.02] shadow-lg shadow-primary/20 hover:shadow-primary/35 text-sm gap-2"
        >
          <!-- Arrow Left Icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            />
          </svg>
          Kembali ke Portfolio
        </a>
      </div>
    </div>
  </body>
</html>
